<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0C14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141720;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3DD6F5;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Glow effects -->
  <circle cx="200" cy="150" r="300" fill="url(#glow)"/>
  <circle cx="1000" cy="500" r="250" fill="url(#glow)"/>
  
  <!-- Logo Circle -->
  <circle cx="600" cy="200" r="80" fill="none" stroke="url(#gradient)" stroke-width="6"/>
  <path d="M 600 150 L 600 200 L 640 240" stroke="url(#gradient)" stroke-width="6" stroke-linecap="round" fill="none"/>
  <circle cx="600" cy="200" r="12" fill="#00E5A0"/>
  
  <!-- Main Title -->
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#F0F2FF" text-anchor="middle">
    Sek<tspan fill="#00E5A0">ur</tspan>a
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="36" font-weight="600" fill="#F0F2FF" text-anchor="middle">
    Sécurité personnelle intelligente
  </text>
  
  <!-- Features -->
  <text x="600" y="470" font-family="Arial, sans-serif" font-size="24" fill="#8892B0" text-anchor="middle" font-weight="400">
    SOS discret • Heatmap IA • Navigation sécurisée
  </text>
  
  <!-- Badge -->
  <rect x="450" y="510" width="300" height="50" rx="25" fill="rgba(0,229,160,0.15)" stroke="#00E5A0" stroke-width="2"/>
  <text x="600" y="545" font-family="Arial, sans-serif" font-size="20" fill="#00E5A0" text-anchor="middle" font-weight="700">
    BIENTÔT DISPONIBLE
  </text>
  
  <!-- URL -->
  <text x="600" y="600" font-family="Arial, sans-serif" font-size="18" fill="#4A5568" text-anchor="middle">
    sekura.space
  </text>
</svg>
